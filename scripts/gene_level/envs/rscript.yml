# Quetzal v0.1 -- R environment for gene-level and genome-wide pipelines.
# Versions pinned to what was installed in qhauck's rstudio-server
# library at the v0.1 freeze (R 4.2.3 base). Bioconductor packages are
# pulled from bioconda; the rest are CRAN packages re-packaged on
# conda-forge.
#
# Build with:
#   conda env create -f environment/quetzal-r.yml
# or, on Snakemake:
#   snakemake --use-conda    (Snakefiles point at this yml via conda:)

name: quetzal-r
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - r-base=4.2.3
  # ---- CRAN packages ------------------------------------------------------
  - r-tidyverse=2.0.0
  - r-readr=2.1.6
  - r-ggplot2=3.5.2
  - r-data.table=1.17.8
  - r-bit64=4.6.0=r43h57805ef_0      # 4.6.0-1 in CRAN; conda-forge pin
  - r-patchwork=1.3.0
  - r-ggforce=0.4.2
  - r-htmlwidgets=1.6.4
  - r-plotly=4.10.4
  - r-nnls=1.5
  - r-aod=1.3.3
  - r-softimpute=1.4_1
  - r-optparse=1.7.5
  # ---- CRAN packages also distributed via bioconda mirroring -------------
  - r-fasttopics=0.6_192
  - r-flashier=1.0.58
  # ---- Bioconductor packages ---------------------------------------------
  - bioconductor-genomicranges=1.50.2
  - bioconductor-ggbio=1.46.0
  - bioconductor-rtracklayer=1.58.0
