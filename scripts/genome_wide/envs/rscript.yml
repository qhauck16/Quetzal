# Quetzal v0.1 R environment.
#
# r-base is pinned to 4.4 so conda resolves a self-consistent
# Bioconductor 3.20 + CRAN snapshot. Individual package versions are
# intentionally NOT pinned -- the exact build hashes from qhauck's
# interactive rstudio-server library don't all exist on conda-forge for
# any single R minor; letting conda solve gets a working env on every
# machine. The scripts run on R 4.4 without changes.
#
# Build it yourself with:
#   conda env create -f environment/quetzal-r.yml
# or just let Snakemake build it via `--use-conda` (the Snakefiles point
# at this yml via conda:).

name: quetzal-r
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - r-base=4.4
  # CRAN packages
  - r-tidyverse
  - r-readr
  - r-ggplot2
  - r-data.table
  - r-bit64
  - r-patchwork
  - r-ggforce
  - r-htmlwidgets
  - r-plotly
  - r-nnls
  - r-aod
  - r-softimpute
  - r-optparse
  # NOTE: r-fasttopics and r-flashier aren't reliably packaged for
  # conda-forge; r-remotes lets the R scripts auto-install them from
  # GitHub on first invocation. RcppParallel (a fastTopics dep) needs
  # to compile from source, so we also need a C++ toolchain in the env.
  - r-remotes
  - gxx_linux-64
  # Bioconductor packages (Bioc 3.20 ships with R 4.4)
  - bioconductor-genomicranges
  - bioconductor-ggbio
  - bioconductor-rtracklayer
